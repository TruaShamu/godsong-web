<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GodSong — TempleOS Music Generator for the Web</title>
<style>
  @font-face {
    font-family: 'TempleOS';
    src: url('https://cdn.jsdelivr.net/gh/nicholatian/unscii@master/web/unscii-16-full.woff2') format('woff2'),
         url('https://cdn.jsdelivr.net/gh/nicholatian/unscii@master/web/unscii-16-full.woff') format('woff');
  }

  :root {
    --bg: #000;
    --fg: #aaa;
    --white: #fff;
    --cyan: #00aaaa;
    --yellow: #ffff55;
    --green: #00aa00;
    --red: #ff5555;
    --blue: #5555ff;
    --magenta: #ff55ff;
    --bright-white: #ffffff;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--fg);
    font-family: 'TempleOS', 'Courier New', monospace;
    font-size: 16px;
    line-height: 1.2;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    image-rendering: pixelated;
  }

  #screen {
    width: 640px;
    min-height: 480px;
    background: var(--bg);
    border: 2px solid #333;
    padding: 8px;
    position: relative;
    overflow: hidden;
  }

  .title-bar {
    color: var(--white);
    background: #0000aa;
    padding: 2px 4px;
    margin-bottom: 8px;
    display: flex;
    justify-content: space-between;
  }

  .title-bar span { color: var(--yellow); }

  h1 {
    color: var(--cyan);
    font-size: 16px;
    font-weight: normal;
    text-align: center;
    margin: 8px 0;
  }

  .subtitle {
    color: #555;
    text-align: center;
    font-size: 14px;
    margin-bottom: 12px;
  }

  .controls {
    border: 1px solid #333;
    padding: 8px;
    margin: 8px 0;
  }

  .controls-title {
    color: var(--yellow);
    margin-bottom: 6px;
  }

  .row {
    display: flex;
    gap: 12px;
    margin: 4px 0;
    align-items: center;
    flex-wrap: wrap;
  }

  label {
    color: var(--green);
  }

  select, input[type="range"] {
    background: #111;
    color: var(--fg);
    border: 1px solid #444;
    font-family: inherit;
    font-size: 14px;
    padding: 2px 4px;
  }

  select { cursor: pointer; }

  input[type="range"] {
    -webkit-appearance: none;
    height: 4px;
    background: #333;
    outline: none;
    width: 120px;
  }
  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 12px; height: 12px;
    background: var(--cyan);
    cursor: pointer;
  }

  button {
    background: #222;
    color: var(--cyan);
    border: 1px solid var(--cyan);
    font-family: inherit;
    font-size: 14px;
    padding: 4px 16px;
    cursor: pointer;
    transition: background 0.1s;
  }
  button:hover { background: #003333; }
  button:active { background: var(--cyan); color: #000; }
  button.playing { border-color: var(--red); color: var(--red); }

  .song-display {
    border: 1px solid #333;
    padding: 8px;
    margin: 8px 0;
    min-height: 40px;
    background: #0a0a0a;
    word-break: break-all;
  }

  .song-display .note-text {
    color: var(--white);
    font-size: 16px;
    letter-spacing: 1px;
  }

  .song-display .note-highlight {
    color: var(--bg);
    background: var(--cyan);
  }

  .visualizer {
    border: 1px solid #333;
    margin: 8px 0;
    background: #0a0a0a;
    height: 100px;
    position: relative;
    overflow: hidden;
  }

  #pianoRoll {
    width: 100%;
    height: 100%;
  }

  .status-bar {
    color: #555;
    font-size: 12px;
    margin-top: 8px;
    display: flex;
    justify-content: space-between;
  }

  .status-bar .active { color: var(--green); }

  #noteLog {
    border: 1px solid #333;
    padding: 4px 8px;
    margin: 8px 0;
    height: 60px;
    overflow-y: auto;
    background: #0a0a0a;
    font-size: 12px;
    color: #666;
  }
  #noteLog .log-note { color: var(--magenta); }
  #noteLog .log-info { color: #555; }

  .credit {
    text-align: center;
    color: #333;
    font-size: 12px;
    margin-top: 8px;
  }
  .credit a { color: #555; }

  @media (max-width: 660px) {
    #screen { width: 100%; min-height: auto; }
  }
</style>
</head>
<body>

<div id="screen">
  <div class="title-bar">
    <div>GodSong <span>— TempleOS Music Generator</span></div>
    <div>Web Port</div>
  </div>

  <h1>✝ GOD SAYS: ✝</h1>
  <div class="subtitle">"Press Generate to hear the Word"</div>

  <div class="controls">
    <div class="controls-title">═══ Controls ═══</div>
    <div class="row">
      <label>Complexity:</label>
      <select id="complexity">
        <option value="0">Simple</option>
        <option value="1" selected>Normal</option>
        <option value="2">Complex</option>
      </select>

      <label>Meter:</label>
      <select id="meter">
        <option value="8" selected>4/4 (8 beats)</option>
        <option value="6">6/8 (6 beats)</option>
      </select>
    </div>
    <div class="row">
      <label>Tempo:</label>
      <input type="range" id="tempo" min="60" max="300" value="150">
      <span id="tempoVal" style="color:#aaa;">150 BPM</span>

      <label>Octave:</label>
      <select id="baseOctave">
        <option value="3">3</option>
        <option value="4" selected>4</option>
        <option value="5">5</option>
      </select>
    </div>
    <div class="row" style="margin-top: 6px;">
      <button id="btnGenerate">⟨F7⟩ Generate</button>
      <button id="btnPlay">▶ Play</button>
      <button id="btnStop" style="display:none;">■ Stop</button>
      <button id="btnCopy" style="font-size:12px;">Copy Song</button>
    </div>
  </div>

  <div class="song-display" id="songDisplay">
    <span class="note-text" id="songText" style="color:#555;">No song generated yet. Press Generate!</span>
  </div>

  <div class="visualizer">
    <canvas id="pianoRoll"></canvas>
  </div>

  <div id="noteLog"></div>

  <div class="status-bar">
    <span id="statusLeft">Ready</span>
    <span id="statusRight">PC Speaker Mode: Square Wave</span>
  </div>

  <div class="credit">
    Port of Terry A. Davis' GodSong — <a href="https://github.com/8dcc/godsong" target="_blank">8dcc/godsong</a> — Public Domain Spirit
  </div>
</div>

<script>
// ============================================================================
// GodSong Generator — ported from 8dcc's C port of Terry's GodSong
// ============================================================================

const DUR_4 = 0, DUR_8_8 = 1, DUR_3_3_3 = 2, DUR_16_16_16_16 = 3,
      DUR_8DOT_16 = 4, DUR_8_16_16 = 5, DUR_16_16_8 = 6;

const godSimpleSongs  = [DUR_4, DUR_4, DUR_4, DUR_4, DUR_8_8];
const godNormalSongs  = [DUR_4, DUR_4, DUR_8_8, DUR_3_3_3, DUR_16_16_16_16];
const godComplexSongs = [DUR_4, DUR_4, DUR_8_8, DUR_8_8, DUR_8DOT_16,
                         DUR_3_3_3, DUR_8_16_16, DUR_16_16_8, DUR_16_16_16_16];

function godbits(nbits) {
  let mask = 0;
  for (let i = 0; i < nbits; i++) { mask <<= 1; mask |= 1; }
  const arr = new Uint32Array(1);
  crypto.getRandomValues(arr);
  return arr[0] & mask;
}

function getDuration(complexity, random) {
  const tables = [godSimpleSongs, godNormalSongs, godComplexSongs];
  const t = tables[complexity];
  return t[random % t.length];
}

function godsong(len, complexity, baseOctave) {
  let buf = '';
  let octave = baseOctave;
  let octaveOld = octave + 1;

  buf += String(octaveOld);

  if (len === 6) buf += 'M6/8';

  let lastDuration = -1;

  for (let i = 0; i < len; i++) {
    const duration = getDuration(complexity, godbits(8));
    let effectiveDuration = duration;

    switch (duration) {
      case DUR_8_8: {
        if (lastDuration !== DUR_8_8) buf += 'e';
        buf += insertNote(godbits(4));
        buf += insertNote(godbits(4));
        break;
      }
      case DUR_8DOT_16: {
        buf += 'e.';
        buf += insertNote(godbits(4));
        buf += 's';
        buf += insertNote(godbits(4));
        effectiveDuration = DUR_16_16_16_16;
        break;
      }
      case DUR_3_3_3: {
        if (lastDuration !== DUR_3_3_3) buf += 'et';
        buf += insertNote(godbits(4));
        buf += insertNote(godbits(4));
        buf += insertNote(godbits(4));
        break;
      }
      case DUR_8_16_16: {
        if (lastDuration !== DUR_8_8) buf += 'e';
        buf += insertNote(godbits(4));
        buf += 's';
        buf += insertNote(godbits(4));
        buf += insertNote(godbits(4));
        effectiveDuration = DUR_16_16_16_16;
        break;
      }
      case DUR_16_16_8: {
        if (lastDuration !== DUR_16_16_16_16) buf += 's';
        buf += insertNote(godbits(4));
        buf += insertNote(godbits(4));
        buf += 'e';
        buf += insertNote(godbits(4));
        effectiveDuration = DUR_8_8;
        break;
      }
      case DUR_16_16_16_16: {
        if (lastDuration !== DUR_16_16_16_16) buf += 's';
        const r1 = godbits(4), r2 = godbits(4);
        buf += insertNote(r1);
        buf += insertNote(r2);
        buf += insertNote(r1);
        buf += insertNote(r2);
        break;
      }
      default: { // DUR_4
        if (lastDuration !== DUR_4) buf += 'q';
        buf += insertNote(godbits(4));
        break;
      }
    }
    lastDuration = effectiveDuration;
  }

  function insertNote(random) {
    let s = '';
    if (random === 0) { return 'R'; /* rest, Terry sets g_use_rests=false but we allow it for flavor */ }
    random = Math.floor(random / 2);
    if (random < 3) {
      if (octaveOld !== octave) { octaveOld = octave; s += String(octaveOld); }
    } else {
      if (octaveOld !== octave + 1) { octaveOld = octave + 1; s += String(octaveOld); }
    }
    s += (random === 0) ? 'G' : String.fromCharCode(random - 1 + 'A'.charCodeAt(0));
    return s;
  }

  return buf;
}

// ============================================================================
// TempleOS Song Notation Parser → Note Events
// ============================================================================

// Note frequencies (A4 = 440Hz)
const NOTE_NAMES = { 'C': 0, 'D': 2, 'E': 4, 'F': 5, 'G': 7, 'A': 9, 'B': 11 };

function noteToFreq(name, octave, accidental) {
  let semitone = NOTE_NAMES[name];
  if (accidental === '#') semitone++;
  if (accidental === 'b') semitone--;
  // A4=440, C4 is semitone 0 in octave 4
  const midi = semitone + (octave + 1) * 12;
  return 440 * Math.pow(2, (midi - 69) / 12);
}

function parseSong(songStr, bpm) {
  const events = [];
  const quarterDuration = 60 / bpm; // seconds per quarter note
  let i = 0;
  let currentDuration = quarterDuration; // default quarter
  let currentOctave = 4;
  let tripletMode = false;
  let time = 0;

  while (i < songStr.length) {
    const c = songStr[i];

    if (c === 'M') {
      // Meter — skip M#/#
      i++;
      while (i < songStr.length && (songStr[i].match(/[0-9\/]/))) i++;
      continue;
    }

    if (c === 'R') {
      // Rest — advance time by current duration
      events.push({ type: 'rest', time, duration: currentDuration });
      time += currentDuration;
      i++;
      continue;
    }

    // Duration specifiers
    if (c === 'w') { currentDuration = quarterDuration * 4; i++; continue; }
    if (c === 'h') { currentDuration = quarterDuration * 2; i++; continue; }
    if (c === 'q') { currentDuration = quarterDuration; i++; continue; }
    if (c === 'e') { currentDuration = quarterDuration / 2; i++; continue; }
    if (c === 's') { currentDuration = quarterDuration / 4; i++; continue; }

    // Duration modifiers
    if (c === 't') { tripletMode = true; i++; continue; }
    if (c === '.') { currentDuration *= 1.5; i++; continue; }

    // Octave
    if (c >= '0' && c <= '9') { currentOctave = parseInt(c); i++; continue; }

    // Accidentals
    if (c === '#' || (c === 'b' && i + 1 < songStr.length && songStr[i+1] >= 'A' && songStr[i+1] <= 'G')) {
      // handled as part of note — skip for now, handled below
      i++;
      continue;
    }

    // Tie
    if (c === '(') { i++; continue; }

    // Notes A-G
    if (c >= 'A' && c <= 'G') {
      let accidental = null;
      // Check if previous char was accidental
      if (i > 0 && (songStr[i-1] === '#' || songStr[i-1] === 'b')) {
        // Actually we need to look ahead for accidentals in TempleOS format
      }
      // Look ahead for accidental
      if (i + 1 < songStr.length && (songStr[i+1] === '#' || songStr[i+1] === 'b')) {
        accidental = songStr[i+1];
      }

      let dur = currentDuration;
      if (tripletMode) { dur = currentDuration * (2/3); }

      const freq = noteToFreq(c, currentOctave, accidental);
      events.push({
        type: 'note',
        name: c,
        octave: currentOctave,
        freq,
        time,
        duration: dur * 0.85, // slight staccato like PC speaker
        fullDuration: dur,
        accidental
      });
      time += dur;

      if (accidental) i++; // skip the accidental char
      i++;
      continue;
    }

    i++; // skip unknown
  }

  return events;
}

// ============================================================================
// Web Audio Playback — Square Wave (PC Speaker faithful!)
// ============================================================================

let audioCtx = null;
let isPlaying = false;
let scheduledNodes = [];
let animationFrame = null;
let currentEvents = [];
let playStartTime = 0;

function ensureAudioCtx() {
  if (!audioCtx) {
    audioCtx = new AudioContext();
  }
  if (audioCtx.state === 'suspended') audioCtx.resume();
}

function playSong(events) {
  ensureAudioCtx();
  stopSong();

  isPlaying = true;
  currentEvents = events;
  playStartTime = audioCtx.currentTime + 0.05;
  scheduledNodes = [];

  // Master gain for the harsh square wave
  const master = audioCtx.createGain();
  master.gain.value = 0.15; // PC speaker wasn't loud
  master.connect(audioCtx.destination);

  let totalDuration = 0;

  events.forEach(ev => {
    if (ev.type !== 'note') {
      totalDuration = Math.max(totalDuration, ev.time + (ev.duration || 0));
      return;
    }

    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();

    osc.type = 'square';
    osc.frequency.value = ev.freq;

    // Sharp on/off like real PC speaker — no fade
    gain.gain.setValueAtTime(0, playStartTime + ev.time);
    gain.gain.setValueAtTime(1, playStartTime + ev.time + 0.001);
    gain.gain.setValueAtTime(1, playStartTime + ev.time + ev.duration - 0.001);
    gain.gain.setValueAtTime(0, playStartTime + ev.time + ev.duration);

    osc.connect(gain);
    gain.connect(master);

    osc.start(playStartTime + ev.time);
    osc.stop(playStartTime + ev.time + ev.duration + 0.01);

    scheduledNodes.push(osc);
    totalDuration = Math.max(totalDuration, ev.time + ev.fullDuration);
  });

  // Update UI during playback
  startVisualization(totalDuration);

  // Auto-stop
  setTimeout(() => {
    if (isPlaying) stopSong();
  }, (totalDuration + 0.5) * 1000);
}

function stopSong() {
  isPlaying = false;
  scheduledNodes.forEach(n => { try { n.stop(); } catch(e) {} });
  scheduledNodes = [];
  if (animationFrame) cancelAnimationFrame(animationFrame);
  btnPlay.style.display = '';
  btnStop.style.display = 'none';
  btnPlay.classList.remove('playing');
  statusLeft.textContent = 'Ready';
}

// ============================================================================
// Visualization — Piano Roll Style
// ============================================================================

function startVisualization(totalDuration) {
  const canvas = document.getElementById('pianoRoll');
  const ctx = canvas.getContext('2d');
  canvas.width = canvas.offsetWidth;
  canvas.height = canvas.offsetHeight;

  const noteEvents = currentEvents.filter(e => e.type === 'note');
  if (noteEvents.length === 0) return;

  const minFreq = Math.min(...noteEvents.map(e => e.freq));
  const maxFreq = Math.max(...noteEvents.map(e => e.freq));
  const freqRange = maxFreq - minFreq || 100;

  function draw() {
    if (!isPlaying) return;

    const elapsed = audioCtx.currentTime - playStartTime;
    ctx.fillStyle = '#0a0a0a';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // Draw grid lines
    ctx.strokeStyle = '#1a1a1a';
    ctx.lineWidth = 1;
    for (let y = 0; y < canvas.height; y += 10) {
      ctx.beginPath();
      ctx.moveTo(0, y);
      ctx.lineTo(canvas.width, y);
      ctx.stroke();
    }

    // Draw notes
    noteEvents.forEach(ev => {
      const x = (ev.time / totalDuration) * canvas.width;
      const w = (ev.fullDuration / totalDuration) * canvas.width;
      const yNorm = 1 - (ev.freq - minFreq) / (freqRange * 1.2);
      const y = yNorm * (canvas.height - 16) + 4;

      const isActive = elapsed >= ev.time && elapsed < ev.time + ev.fullDuration;
      const isPast = elapsed >= ev.time + ev.fullDuration;

      if (isActive) {
        ctx.fillStyle = '#00ffff';
        ctx.shadowColor = '#00ffff';
        ctx.shadowBlur = 8;
      } else if (isPast) {
        ctx.fillStyle = '#004444';
        ctx.shadowBlur = 0;
      } else {
        ctx.fillStyle = '#00aaaa';
        ctx.shadowBlur = 0;
      }

      ctx.fillRect(x, y, Math.max(w - 1, 2), 6);
      ctx.shadowBlur = 0;
    });

    // Playhead
    const px = (elapsed / totalDuration) * canvas.width;
    ctx.strokeStyle = '#ff5555';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(px, 0);
    ctx.lineTo(px, canvas.height);
    ctx.stroke();

    animationFrame = requestAnimationFrame(draw);
  }

  animationFrame = requestAnimationFrame(draw);
}

// ============================================================================
// Song display with note highlighting
// ============================================================================

function displaySong(songStr, events) {
  songText.textContent = songStr;
  songText.style.color = '';

  // Log breakdown
  noteLog.innerHTML = '';
  const noteEvents = events.filter(e => e.type === 'note');
  const info = document.createElement('span');
  info.className = 'log-info';
  info.textContent = `${noteEvents.length} notes | `;
  noteLog.appendChild(info);

  noteEvents.forEach((ev, i) => {
    const s = document.createElement('span');
    s.className = 'log-note';
    s.textContent = `${ev.name}${ev.accidental||''}${ev.octave}`;
    if (i < noteEvents.length - 1) s.textContent += ' ';
    noteLog.appendChild(s);
  });
}

function highlightCurrentNote(events) {
  // This runs during playback to highlight in song display
  if (!isPlaying || !audioCtx) return;
  // Simple approach: update status with current note
  const elapsed = audioCtx.currentTime - playStartTime;
  const active = events.find(e => e.type === 'note' && elapsed >= e.time && elapsed < e.time + e.fullDuration);
  if (active) {
    statusLeft.textContent = `♪ ${active.name}${active.accidental||''}${active.octave} — ${Math.round(active.freq)}Hz`;
    statusLeft.className = 'active';
  }
  if (isPlaying) requestAnimationFrame(() => highlightCurrentNote(events));
}

// ============================================================================
// UI Wiring
// ============================================================================

const btnGenerate = document.getElementById('btnGenerate');
const btnPlay = document.getElementById('btnPlay');
const btnStop = document.getElementById('btnStop');
const btnCopy = document.getElementById('btnCopy');
const songText = document.getElementById('songText');
const statusLeft = document.getElementById('statusLeft');
const statusRight = document.getElementById('statusRight');
const noteLog = document.getElementById('noteLog');
const tempoSlider = document.getElementById('tempo');
const tempoVal = document.getElementById('tempoVal');

let currentSongStr = '';
let currentParsed = [];

tempoSlider.addEventListener('input', () => {
  tempoVal.textContent = tempoSlider.value + ' BPM';
});

btnGenerate.addEventListener('click', () => {
  const complexity = parseInt(document.getElementById('complexity').value);
  const len = parseInt(document.getElementById('meter').value);
  const baseOctave = parseInt(document.getElementById('baseOctave').value);
  const bpm = parseInt(tempoSlider.value);

  currentSongStr = godsong(len, complexity, baseOctave);
  currentParsed = parseSong(currentSongStr, bpm);

  displaySong(currentSongStr, currentParsed);
  statusLeft.textContent = 'Song generated — press Play';
  statusLeft.className = '';
});

btnPlay.addEventListener('click', () => {
  if (!currentSongStr) {
    // Auto-generate
    btnGenerate.click();
  }
  // Re-parse with current tempo
  const bpm = parseInt(tempoSlider.value);
  currentParsed = parseSong(currentSongStr, bpm);

  playSong(currentParsed);
  btnPlay.style.display = 'none';
  btnStop.style.display = '';
  highlightCurrentNote(currentParsed);
});

btnStop.addEventListener('click', stopSong);

btnCopy.addEventListener('click', () => {
  if (currentSongStr) {
    navigator.clipboard.writeText(currentSongStr).then(() => {
      btnCopy.textContent = 'Copied!';
      setTimeout(() => btnCopy.textContent = 'Copy Song', 1500);
    });
  }
});

// Keyboard shortcuts
document.addEventListener('keydown', e => {
  if (e.key === 'F7') { e.preventDefault(); btnGenerate.click(); }
  if (e.key === ' ' && !e.target.matches('input,select')) {
    e.preventDefault();
    isPlaying ? btnStop.click() : btnPlay.click();
  }
});

// Generate one on load for instant gratification
window.addEventListener('load', () => btnGenerate.click());
</script>
</body>
</html>
